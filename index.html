<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shop - Premium E-commerce</title>
    <style>
        :root { --bg: #f8fafc; --card: white; --text: #1e293b; --primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%); --accent: #ff6b6b; }
        [data-theme="dark"] { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); transition: all 0.3s; }
        header { background: var(--primary); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { font-size: 1.8rem; font-weight: bold; }
        nav { display: flex; gap: 1rem; align-items: center; }
        nav a, .btn { color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 25px; backdrop-filter: blur(10px); transition: all 0.3s; }
        nav a:hover { transform: translateY(-2px); }
        #search { padding: 0.5rem; border-radius: 25px; border: none; width: 250px; }
        #hero { background: var(--primary); color: white; text-align: center; padding: 4rem 2rem; position: relative; overflow: hidden; }
        #hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>'); }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .categories { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin: 2rem 0; }
        .cat-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 25px; cursor: pointer; transition: all 0.3s; }
        .cat-btn.active, .cat-btn:hover { background: var(--accent); transform: scale(1.05); }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .product { background: var(--card); padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); backdrop-filter: blur(10px); transition: all 0.4s; position: relative; overflow: hidden; }
        .product:hover { transform: translateY(-10px); box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .product img { width: 100%; height: 220px; object-fit: cover; border-radius: 15px; }
        .price { font-size: 1.8rem; color: #10b981; font-weight: bold; }
        .rating { color: #fbbf24; }
        .wishlist { position: absolute; top: 1rem; right: 1rem; background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }
        #cart, #auth-modal, #newsletter { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 2rem; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 1000; min-width: 400px; }
        .close { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; }
        #dark-toggle { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .slider { overflow: hidden; }
        @keyframes fly { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(1.2) translate(50px, -50px); } 100% { transform: scale(0) translate(100px, -100px); opacity: 0; } }
        .fly-item { animation: fly 0.8s ease-out forwards; }
        @media (max-width: 768px) { .products { grid-template-columns: 1fr; } nav { flex-direction: column; gap: 0.5rem; } }
    </style>
</head>
<body>
    <header>
        <div class="logo">🚀 AI Shop</div>
        <nav>
            <input type="text" id="search" placeholder="🔍 Search...">
            <button id="login-btn">Login</button>
            <button id="dark-toggle">🌙</button>
            <a href="#" onclick="toggleCart()">🛒 <span id="cart-count">0</span></a>
        </nav>
    </header>
    <section id="hero" class="slider">
        <h1>Discover Premium AI & Hardware</h1>
        <p>Next-gen tools for tracking, detection & more. Fast shipping worldwide!</p>
    </section>
    <div class="container">
        <div class="categories">
            <button class="cat-btn active" data-cat="all">All</button>
            <button class="cat-btn" data-cat="AI">AI Tools</button>
            <button class="cat-btn" data-cat="Hardware">Hardware</button>
        </div>
        <div id="products" class="products"></div>
        <button onclick="openNewsletter()">Newsletter Signup</button>
    </div>

    <!-- Modals -->
    <div id="cart">
        <span class="close" onclick="toggleCart()">&times;</span>
        <h2>🛒 Shopping Cart</h2>
        <div id="cart-items"></div>
        <div id="total"></div>
        <button onclick="checkout()">💳 Checkout</button>
    </div>
    <div id="auth-modal">
        <span class="close" onclick="closeAuth()">&times;</span>
        <h2 id="auth-title">Login</h2>
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="handleAuth()">Submit</button>
        <p id="auth-toggle" style="cursor: pointer; color: var(--accent);">Need account? Register</p>
    </div>
    <div id="newsletter">
        <span class="close" onclick="closeNewsletter()">&times;</span>
        <h2>📧 Join Newsletter</h2>
        <input type="email" id="email-news" placeholder="Your email">
        <button onclick="signupNewsletter()">Subscribe</button>
    </div>
    <form id="checkout-form" style="display:none;">
        <!-- Existing checkout form here, omitted for brevity -->
    </form>

    <script>
        // Enhanced products with categories, ratings
        const products = [
            { id: 1, name: 'DeepSORT Tracker', price: 129, img: 'https://via.placeholder.com/300x220/667eea/fff?text=DeepSORT', category: 'AI', rating: 4.8 },
            { id: 2, name: 'YOLOv8 Detector', price: 199, img: 'https://via.placeholder.com/300x220/764ba2/fff?text=YOLOv8', category: 'AI', rating: 4.9 },
            { id: 3, name: 'RTX 5090 GPU', price: 1999, img: 'https://via.placeholder.com/300x220/ff6b6b/fff?text=RTX+5090', category: 'Hardware', rating: 4.7 },
            { id: 4, name: 'AI Laptop Pro', price: 1499, img: 'https://via.placeholder.com/300x220/10b981/fff?text=AI+Laptop', category: 'Hardware', rating: 4.6 },
            { id: 5, name: 'MOT17 Dataset', price: 49, img: 'https://via.placeholder.com/300x220/3b82f6/fff?text=MOT17', category: 'AI', rating: 4.5 },
            { id: 6, name: 'Edge TPU', price: 299, img: 'https://via.placeholder.com/300x220/f59e0b/fff?text=Edge+TPU', category: 'Hardware', rating: 4.4 }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        let user = JSON.parse(localStorage.getItem('user')) || null;
        let currentCat = 'all';

        // Dark mode
        const darkToggle = document.getElementById('dark-toggle');
        darkToggle.addEventListener('click', () => document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark');

        function renderProducts(filter = '', cat = 'all') {
            const container = document.getElementById('products');
            let filtered = products.filter(p => 
                p.name.toLowerCase().includes(filter.toLowerCase()) && 
                (cat === 'all' || p.category === cat)
            );
            container.innerHTML = filtered.map(p => {
                const isWish = wishlist.includes(p.id);
                return `
                    <div class="product">
                        <button class="wishlist" onclick="toggleWishlist(${p.id})">${isWish ? '❤️' : '🤍'}</button>
                        <img src="${p.img}" alt="${p.name}">
                        <h3>${p.name}</h3>
                        <div class="rating">⭐ ${'★'.repeat(Math.floor(p.rating))}${p.rating % 1 ? '☆' : ''} (${p.rating})</div>
                        <p class="price">$${p.price}</p>
                        <button class="btn fly-item" onclick="addToCart(${p.id}, this)">Add to Cart</button>
                    </div>
                `;
            }).join('');
        }

        function addToCart(id, btn) {
            btn.classList.add('fly-item');
            setTimeout(() => btn.classList.remove('fly-item'), 800);
            // Rest of addToCart logic from previous (unchanged, omitted for space)
            const product = products.find(p => p.id === id);
            const cartItem = cart.find(item => item.id === id);
            if (cartItem) cartItem.qty += 1; else cart.push({...product, qty: 1});
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            // Shake cart
            const cartEl = document.getElementById('cart');
            cartEl.style.animation = 'shake 0.5s';
            setTimeout(() => cartEl.style.animation = '', 500);
        }

        // Add shake keyframe
        const style = document.createElement('style');
        style.textContent = `@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }`;
        document.head.appendChild(style);

        // Wishlist
        function toggleWishlist(id) {
            const idx = wishlist.indexOf(id);
            if (idx > -1) wishlist.splice(idx, 1); else wishlist.push(id);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            renderProducts(document.getElementById('search').value, currentCat);
        }

        // Categories
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.cat-btn.active').classList.remove('active');
                btn.classList.add('active');
                currentCat = btn.dataset.cat;
                renderProducts(document.getElementById('search').value, currentCat);
            });
        });

        // Auth
        let isLogin = true;
        document.getElementById('login-btn').onclick = () => {
            document.getElementById('auth-modal').style.display = 'block';
            document.getElementById('auth-title').textContent = isLogin ? 'Login' : 'Register';
        };
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        function handleAuth() {
            const uname = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (isLogin) {
                user = { uname, pass }; // Simulate login
            } else {
                localStorage.setItem('users', JSON.stringify([{uname, pass}])); // Simple register
                user = { uname, pass };
            }
            localStorage.setItem('user', JSON.stringify(user));
            closeAuth();
            document.getElementById('login-btn').textContent = `Hi, ${uname}`;
        }
        document.getElementById('auth-toggle').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').textContent = isLogin ? 'Login' : 'Register';
        };

        // Newsletter
        function openNewsletter() { document.getElementById('newsletter').style.display = 'block'; }
        function closeNewsletter() { document.getElementById('newsletter').style.display = 'none'; }
        function signupNewsletter() {
            console.log('Subscribed:', document.getElementById('email-news').value);
            alert('Thanks for subscribing!');
            closeNewsletter();
        }

        // Existing cart functions (updateCartCount, renderCart, etc.) unchanged, omitted for brevity

        document.getElementById('search').addEventListener('input', (e) => renderProducts(e.target.value, currentCat));

        // Init
        if (user) document.getElementById('login-btn').textContent = `Hi, ${user.uname}`;
        renderProducts();
        updateCartCount();
    </script>
</body>
</html>
