<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon AI Shop - Cyberpunk Ecommerce</title>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.12.2/firebase-auth-compat.min.js"></script>
    <style>
        :root { 
            --neon-bg: linear-gradient(135deg, #0c0c0c 0%, #1a0033 50%, #0f0f23 100%); 
            --glass: rgba(255,255,255,0.05); 
            --neon-glow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            --cyber-gradient: linear-gradient(45deg, #ff00ff, #00ffff, #00ff00, #ffaa00);
        }
        [data-theme="dark"] { --neon-bg: linear-gradient(135deg, #000011 0%, #1a001a 50%, #110011 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Orbitron', monospace; 
            background: var(--neon-bg); 
            color: #e0e0ff; 
            overflow-x: hidden;
            position: relative;
        }
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        header { 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); 
            padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; 
            box-shadow: var(--neon-glow); border-bottom: 1px solid rgba(0,255,255,0.3);
        }
        .logo { 
            font-size: 2rem; background: var(--cyber-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            text-shadow: var(--neon-glow); animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { from { filter: drop-shadow(0 0 5px #00ffff); } to { filter: drop-shadow(0 0 20px #ff00ff); } }
        nav { display: flex; gap: 1rem; align-items: center; }
        .btn { 
            background: var(--glass); border: 1px solid rgba(0,255,255,0.3); 
            padding: 0.75rem 1.5rem; border-radius: 25px; color: #00ffff; 
            backdrop-filter: blur(20px); transition: all 0.3s; cursor: pointer;
            position: relative; overflow: hidden;
        }
        .btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,255,255,0.4), transparent); transition: 0.5s; }
        .btn:hover::before { left: 100%; }
        .btn:hover { box-shadow: var(--neon-glow); transform: scale(1.05) rotate(2deg); }
        #hero { 
            height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; position: relative; overflow: hidden;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%), 
                        radial-gradient(circle at 80% 20%, rgba(120,119,198,0.3) 0%, transparent 50%), 
                        radial-gradient(circle at 40% 40%, rgba(120,119,198,0.3) 0%, transparent 50%);
        }
        .hero-slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s; }
        .hero-slide.active { opacity: 1; }
        .hero-slide h1 { font-size: 4rem; text-shadow: var(--neon-glow); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .hero-slide img { width: 300px; height: 300px; border-radius: 50%; filter: drop-shadow(var(--neon-glow)); animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .container { max-width: 1400px; margin: 0 auto; padding: 4rem 2rem; perspective: 1000px; }
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 3rem; }
        .product { 
            background: var(--glass); border-radius: 25px; padding: 2rem; 
            backdrop-filter: blur(20px); border: 1px solid rgba(0,255,255,0.2);
            transition: all 0.6s cubic-bezier(0.25,0.46,0.45,0.94); transform-style: preserve-3d;
            position: relative; overflow: hidden;
        }
        .product::before { 
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
            background: var(--cyber-gradient); opacity: 0; transition: opacity 0.5s;
        }
        .product:hover::before { opacity: 0.1; }
        .product:hover { transform: rotateY(10deg) rotateX(10deg) translateZ(50px); box-shadow: var(--neon-glow), 0 0 60px rgba(0,255,255,0.3); }
        .product img { width: 100%; height: 250px; object-fit: cover; border-radius: 20px; transition: transform 0.5s; }
        .product:hover img { transform: scale(1.1) rotate(5deg); }
        .price { font-size: 2.2rem; background: var(--cyber-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .wishlist { background: rgba(255,0,255,0.2); border: none; border-radius: 50%; width: 50px; height: 50px; }
        /* Loading screen */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .warp { width: 100px; height: 100px; border: 5px solid #00ffff; border-top: 5px solid transparent; border-radius: 50%; animation: warp 1s linear infinite; }
        @keyframes warp { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-in { opacity: 0; transform: translateY(50px); transition: all 1s; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
        @media (max-width: 768px) { .hero-slide h1 { font-size: 2.5rem; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loader"><div class="warp"></div></div>
    <div id="particles-js"></div>
    
    <header>
        <div class="logo">NEON AI SHOP</div>
        <nav>
            <input type="text" id="search" placeholder="🔍 Neural Search...">
            <!-- Firebase auth buttons from previous -->
            <div id="auth-status">
                <button id="login-btn" class="btn">Login</button>
            </div>
            <button id="dark-toggle" class="btn">⚡</button>
            <button class="btn" onclick="toggleCart()">🛒 <span id="cart-count">0</span></button>
        </nav>
    </header>

    <section id="hero">
        <div class="hero-slide active">

            <h1>NEURAL TRACKING SYSTEMS</h1>
            <p>Quantum-powered object detection. Future is now.</p>
        </div>
        <div class="hero-slide">
            <img src="https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=400&fit=crop" alt="AI Core">
            <h1>HOLOGRAPHIC HARDWARE</h1>
            <p>Edge AI chips for infinite compute.</p>
        </div>
        <div class="hero-slide">
            <img src="https://images.unsplash.com/photo-1541462628-9d3f71a97968?w=400&fit=crop" alt="Neural Net">
            <h1>DEEP NEURAL ENGINES</h1>
            <p>Train models at light speed.</p>
        </div>
    </section>

    <div class="container">
        <div class="categories">
            <button class="cat-btn active btn" data-cat="all">ALL SYSTEMS</button>
            <button class="cat-btn btn" data-cat="AI">NEURAL AI</button>
            <button class="cat-btn btn" data-cat="Hardware">CYBER HARDWARE</button>
        </div>
        <div id="products" class="products"></div>
    </div>

    <!-- Modals from previous (cart, auth, etc.) -->

    <script>
        // Futuristic products with sci-fi images
        const products = [

            { id: 2, name: 'YOLOv10 Neural Eye', price: 499, img: 'https://images.unsplash.com/photo-1558618047-8c40e08d695e?w=400', category: 'AI', rating: 5.0 },
            { id: 3, name: 'RTX Cyber 5090', price: 2999, img: 'https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=400', category: 'Hardware', rating: 4.8 },
            { id: 4, name: 'Holo-Laptop X1', price: 2499, img: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400', category: 'Hardware', rating: 4.7 },
            { id: 5, name: 'Neural Core v9', price: 899, img: 'https://images.unsplash.com/photo-1541462628-9d3f71a97968?w=400', category: 'AI', rating: 4.9 },
            { id: 6, name: 'Photon GPU Array', price: 1899, img: 'https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=400', category: 'Hardware', rating: 4.8 },
            { id: 7, name: 'MOT Quantum Dataset', price: 99, img: 'https://images.unsplash.com/photo-1558618047-8c40e08d695e?w=400', category: 'AI', rating: 4.6 },
            { id: 8, name: 'Edge Nexus TPU', price: 599, img: 'https://images.unsplash.com/photo-1517433456452-f9633a875f6f?w=400', category: 'Hardware', rating: 4.9 },
            { id: 9, name: 'DeepMind Accelerator', price: 1299, img: 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400', category: 'AI', rating: 5.0 },
            { id: 10, name: 'Plasma VR Rig', price: 3999, img: 'https://images.unsplash.com/photo-1573164713988-8665fc963095?w=400', category: 'Hardware', rating: 4.7 },
            { id: 11, name: 'SynthWave Detector', price: 399, img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400', category: 'AI', rating: 4.8 },

        ];

        // Particles
        particlesJS('particles-js', {
            particles: { number: { value: 80 }, color: { value: '#00ffff' }, shape: { type: 'circle' }, opacity: { value: 0.5 }, size: { value: 3 }, move: { speed: 2 } },
            interactivity: { detect_on: 'canvas', events: { onhover: { enable: true, mode: 'repulse' } } }
        });

        // Hero slider
        let heroIndex = 0;
        const slides = document.querySelectorAll('.hero-slide');
        setInterval(() => {
            slides[heroIndex].classList.remove('active');
            heroIndex = (heroIndex + 1) % slides.length;
            slides[heroIndex].classList.add('active');
        }, 4000);

        // Loading screen
        window.addEventListener('load', () => {
            document.getElementById('loader').style.display = 'none';
        });

        // Scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        });
        document.querySelectorAll('.product').forEach(el => {
            el.classList.add('fade-in');
            observer.observe(el);
        });

        }

        // Firebase auth, cart logic from previous (unchanged)

        // Init
        renderProducts();
        updateCartCount();
        updateAuthUI();
    </script>
</body>
</html>
